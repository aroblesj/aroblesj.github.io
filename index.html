<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adrian | About Me</title>
  <meta name="description" content="Sleek, modern, and high-contrast professional portfolio website featuring dark blue, light blue, and grey glassmorphic design.">
  
  <!-- Premium Modern Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Custom Design System Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Invisible SVG filter for grid displacement/warp -->
  <svg style="position: absolute; width: 0; height: 0; pointer-events: none;" aria-hidden="true">
    <filter id="grid-displacement">
      <!-- Load displacement map at 512x512 tile size -->
      <feImage href="assets/paper_normal.png" result="tile" width="512" height="512" />
      <!-- Tile it across the entire filter region -->
      <feTile in="tile" result="normalMap" />
      <!-- Displace the gridlines based on R (horizontal) and G (vertical) channels -->
      <feDisplacementMap in="SourceGraphic" in2="normalMap" scale="5" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </svg>

  <!-- Simple background grid -->
  <div class="bg-grid"></div>

  <!-- Fixed Smooth Bouncing Scroll Indicator Arrows (Top & Bottom) -->
  <a href="#home" class="scroll-indicator scroll-indicator-top hidden" id="scroll-arrow-top" aria-label="Scroll up">
    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="18 15 12 9 6 15"></polyline>
    </svg>
  </a>
  <a href="#skills" class="scroll-indicator scroll-indicator-bottom" id="scroll-arrow-bottom" aria-label="Scroll down">
    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6 9 12 15 18 9"></polyline>
    </svg>
  </a>

  <!-- Floating Frozen Header (Injects js/components/Header.js) -->
  <header id="site-header"></header>

  <!-- Main Content Sections (Injects other components) -->
  <main id="site-main">
    <section id="home" class="section-container"></section>
    <section id="skills" class="section-container"></section>
    <section id="projects" class="section-container"></section>
    <section id="contact" class="section-container"></section>
  </main>

  <!-- Fullscreen Lightbox Modal for Project Preview Images -->
  <div id="project-lightbox" class="project-lightbox" aria-hidden="true">
    <span class="lightbox-close" aria-label="Close fullscreen view">&times;</span>
    <img class="lightbox-content" id="lightbox-img" alt="Fullscreen preview rendering" />
  </div>

  <!-- Native Client-side JavaScript Component App Entrypoint -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
